name: TCBC len WordPress moi ngay

on:
  schedule:
    # Cron chay theo gio UTC. 18:00 UTC = 01:00 sang hom sau o VN (UTC+7).
    - cron: "0 18 * * *"
  workflow_dispatch:        # nut bam chay tay de test
    inputs:
      dry_run:
        description: "Chay thu khong dang bai (true/false)"
        required: false
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python press_to_wp.py
        env:
          IMAP_HOST:         ${{ secrets.IMAP_HOST }}
          IMAP_USER:         ${{ secrets.IMAP_USER }}
          IMAP_PASS:         ${{ secrets.IMAP_PASS }}
          IMAP_FOLDER:       ${{ secrets.IMAP_FOLDER }}
          PROCESSED_FOLDER:  ${{ secrets.PROCESSED_FOLDER }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USER:           ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          WP_CATEGORY_ID:    ${{ secrets.WP_CATEGORY_ID }}
          POST_STATUS:       ${{ secrets.POST_STATUS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          AI_CLEANUP:        ${{ secrets.AI_CLEANUP }}
          DRY_RUN:           ${{ github.event.inputs.dry_run }}
