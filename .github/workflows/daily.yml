name: TCBC len WordPress moi ngay

on:
  # Lich tu dong da tat. Bo dau thang o hai dong duoi de bat lai.
  # schedule:
  #   - cron: "0 18 * * *"   # 18:00 UTC = 01:00 sang hom sau o VN (UTC+7)
  workflow_dispatch:          # chi chay khi bam nut Run workflow

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python press_to_wp.py
        env:
          IMAP_HOST:         ${{ secrets.IMAP_HOST }}
          IMAP_USER:         ${{ secrets.IMAP_USER }}
          IMAP_PASS:         ${{ secrets.IMAP_PASS }}
          IMAP_FOLDER:       ${{ secrets.IMAP_FOLDER }}
          GMAIL_RAW_SEARCH:  ${{ secrets.GMAIL_RAW_SEARCH }}
          PROCESSED_FOLDER:  ${{ secrets.PROCESSED_FOLDER }}
          WP_URL:            ${{ secrets.WP_URL }}
          WP_USER:           ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          WP_CATEGORY_ID:    ${{ secrets.WP_CATEGORY_ID }}
          POST_STATUS:       ${{ secrets.POST_STATUS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          AI_CLEANUP:        ${{ secrets.AI_CLEANUP }}
          DRY_RUN:           "false"
